name: Metrics
on:
  schedule:
    - cron: "0 0 * * 0" 
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Necesitamos el checkout para manejar la carpeta dist
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Generar la Snake 
      - name: Generate Snake
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: LucasCampoli
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Generar las Metrics
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LucasCampoli
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires
          output_action: commit
          committer_branch: output # Aquí le decimos que apunte a output
          filename: github-metrics.svg
          
          plugin_languages: yes
          plugin_languages_details: percentage, lines # Muestra % y líneas por lenguaje
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8 # No pongas mil lenguajes, solo los top 8
          
          plugin_lines: yes # Muestra el total de líneas de código escritas
          
          plugin_followup: yes # Muestra el estado de tus Issues y PRs (bueno para Ciber/Cloud)
          plugin_followup_sections: user
          
          plugin_introduction: yes # Una intro breve generada por el bot
          
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 10

          plugin_achievements: yes
          plugin_achievements_threshold: B # Solo muestra medallas de nivel B o superior
          plugin_achievements_display: compact
          

      # 4. Pushear la Snake a la rama output 
      - name: Deploy Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
