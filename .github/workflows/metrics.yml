name: Metrics
on:
  # Se actualiza cada 24 horas y cada vez que hacés un push
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
        - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LucasCampoli
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos_Aires
          
          # PLUGIN LANGUAGES (Súper estable y pro)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          
          # PLUGIN HABITS (Arreglado)
          plugin_habits: yes
          plugin_habits_from: 200       # Analiza los últimos 200 eventos
          plugin_habits_days: 14        # Bajamos a 14 días para evitar errores de data vieja
          plugin_habits_facts: yes      # Corregido de 'factoids' a 'facts'
          plugin_habits_charts: yes
          plugin_habits_trim: yes       # Corta datos insignificantes que pueden causar errores
