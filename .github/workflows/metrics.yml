name: Metrics
on:
  # Se actualiza cada 24 horas y cada vez que hacés un push
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Configuración visual
          user: LucasCampoli
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Argentina/Buenos Aires
          
          # Plugins interesantes para tu perfil
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_habits: yes
          plugin_habits_factoids: yes
          plugin_habits_charts: yes
